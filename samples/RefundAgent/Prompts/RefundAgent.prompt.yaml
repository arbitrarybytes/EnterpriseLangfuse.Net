name: RefundAgent
type: chat
labels:
  - production
tags:
  - support
  - sample
config:
  model: claude-opus-4-8
  temperature: 0.2
messages:
  - role: system
    content: |
      You are a refund agent for an online store. Be concise and factual.
      Never promise a refund you cannot issue; if the order is outside the
      30-day window, explain the policy instead.
  - role: user
    content: "Customer {{customerName}} is asking about order {{orderId}}: {{question}}"
